<svg xmlns="http://www.w3.org/2000/svg" width="1180" height="760" viewBox="0 0 1180 760" role="img" aria-labelledby="title desc">
  <title id="title">保护模式下 mov eax, [es:0x100] 的地址形成过程</title>
  <desc id="desc">ES 选择子 0x0018 选中 GDT 第 3 项，GDTR 指向内存中的 GDT，GDT[3] 描述符给出 base 0x00400000，加上偏移 0x100 得到线性地址 0x00400100。</desc>
  <defs>
    <marker id="arrow-blue" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L8,3 L0,6 Z" fill="#2563eb"/>
    </marker>
    <marker id="arrow-green" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L8,3 L0,6 Z" fill="#059669"/>
    </marker>
    <marker id="arrow-orange" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L8,3 L0,6 Z" fill="#d97706"/>
    </marker>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="130%">
      <feDropShadow dx="0" dy="3" stdDeviation="5" flood-color="#0f172a" flood-opacity="0.14"/>
    </filter>
    <style>
      .bg { fill: #f8fafc; }
      .panel { fill: #ffffff; stroke: #cbd5e1; stroke-width: 2; filter: url(#shadow); }
      .section-title { fill: #0f172a; font: 700 24px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
      .label { fill: #334155; font: 600 17px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
      .text { fill: #334155; font: 15px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
      .small { fill: #475569; font: 13px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
      .mono { fill: #0f172a; font: 15px ui-monospace, SFMono-Regular, Menlo, Consolas, monospace; }
      .mono-strong { fill: #0f172a; font: 700 17px ui-monospace, SFMono-Regular, Menlo, Consolas, monospace; }
      .blue { fill: #1d4ed8; }
      .green { fill: #047857; }
      .orange { fill: #b45309; }
      .muted { fill: #64748b; }
      .cpu-fill { fill: #eff6ff; stroke: #93c5fd; }
      .reg-fill { fill: #ffffff; stroke: #60a5fa; }
      .memory-fill { fill: #f8fafc; stroke: #cbd5e1; }
      .gdt-hit { fill: #ecfdf5; stroke: #34d399; stroke-width: 2; }
      .gdt-row { fill: #ffffff; stroke: #cbd5e1; stroke-width: 1.4; }
      .target { fill: #fff7ed; stroke: #f59e0b; stroke-width: 2; }
      .calc { fill: #fffbeb; stroke: #fbbf24; stroke-width: 2; }
    </style>
  </defs>

  <rect class="bg" x="0" y="0" width="1180" height="760"/>
  <text class="section-title" x="46" y="54">一行 mov 是怎么落到具体内存地址的</text>
  <text class="mono" x="46" y="86">mov eax, [es:0x100]</text>

  <rect class="panel cpu-fill" x="40" y="122" width="410" height="330" rx="8"/>
  <text class="section-title" x="68" y="162">CPU 寄存器</text>

  <rect class="reg-fill" x="68" y="188" width="354" height="100" rx="6"/>
  <text class="label" x="92" y="222">GDTR</text>
  <text class="mono" x="92" y="250">Base  = 0x00007C40</text>
  <text class="mono" x="92" y="274">Limit = 0x0000001F</text>
  <text class="small muted" x="278" y="250">GDT 首地址</text>
  <text class="small muted" x="278" y="274">4 条描述符 - 1</text>

  <rect class="reg-fill" x="68" y="320" width="354" height="124" rx="6"/>
  <text class="label" x="92" y="354">ES</text>
  <text class="mono" x="92" y="382">Selector = 0x0018</text>
  <text class="mono" x="92" y="406">Index    = 0x0018 &gt;&gt; 3 = 3</text>
  <text class="mono" x="92" y="430">Hidden base = 0x00400000</text>

  <rect class="panel memory-fill" x="544" y="122" width="590" height="456" rx="8"/>
  <text class="section-title" x="572" y="162">内存布局</text>
  <text class="small muted" x="682" y="162">GDT 在内存中连续排放，每条描述符 8 字节</text>

  <text class="label" x="572" y="202">GDT</text>
  <rect class="gdt-row" x="572" y="224" width="514" height="58" rx="4"/>
  <text class="mono" x="592" y="260">0x00007C40</text>
  <text class="mono" x="714" y="260">GDT[0]</text>
  <text class="mono" x="812" y="260">0x0000000000000000</text>

  <rect class="gdt-row" x="572" y="282" width="514" height="58" rx="4"/>
  <text class="mono" x="592" y="318">0x00007C48</text>
  <text class="mono" x="714" y="318">GDT[1]</text>
  <text class="mono" x="812" y="318">0x00CF9A000000FFFF</text>

  <rect class="gdt-row" x="572" y="340" width="514" height="58" rx="4"/>
  <text class="mono" x="592" y="376">0x00007C50</text>
  <text class="mono" x="714" y="376">GDT[2]</text>
  <text class="mono" x="812" y="376">0x00CF92000000FFFF</text>

  <rect class="gdt-hit" x="572" y="398" width="514" height="82" rx="4"/>
  <text class="mono-strong green" x="592" y="434">0x00007C58</text>
  <text class="mono-strong green" x="714" y="434">GDT[3]</text>
  <text class="mono-strong green" x="812" y="434">0x00CF92400000FFFF</text>
  <text class="small green" x="592" y="462">描述符字段：base = 0x00400000，limit = 0xFFFFFFFF，数据段可读写</text>

  <rect class="calc" x="572" y="514" width="514" height="42" rx="5"/>
  <text class="mono-strong orange" x="594" y="541">base 0x00400000 + offset 0x100 = 0x00400100</text>

  <rect class="target" x="662" y="638" width="334" height="72" rx="6"/>
  <text class="label orange" x="690" y="672">最终访问的线性地址</text>
  <text class="mono-strong orange" x="690" y="696">0x00400100</text>

  <path d="M422 236 C470 236, 496 236, 560 238" fill="none" stroke="#2563eb" stroke-width="3" marker-end="url(#arrow-blue)"/>
  <rect x="462" y="205" width="64" height="24" rx="4" fill="#eff6ff" stroke="#93c5fd"/>
  <text class="small blue" x="476" y="222">1. 指表</text>

  <path d="M422 378 C502 378, 500 432, 566 432" fill="none" stroke="#059669" stroke-width="3" marker-end="url(#arrow-green)"/>
  <rect x="468" y="386" width="58" height="24" rx="4" fill="#ecfdf5" stroke="#86efac"/>
  <text class="small green" x="482" y="403">2. 选项</text>

  <path d="M572 456 C512 456, 480 430, 426 424" fill="none" stroke="#059669" stroke-width="3" marker-end="url(#arrow-green)"/>
  <rect x="464" y="452" width="62" height="24" rx="4" fill="#ecfdf5" stroke="#86efac"/>
  <text class="small green" x="478" y="469">3. 缓存</text>

  <path d="M246 444 C246 532, 496 535, 568 535" fill="none" stroke="#d97706" stroke-width="3" marker-end="url(#arrow-orange)"/>
  <text class="small orange" x="72" y="494">4. 这条访存使用 ES.hidden base</text>

  <path d="M832 556 C832 596, 832 608, 832 634" fill="none" stroke="#d97706" stroke-width="3" marker-end="url(#arrow-orange)"/>
  <text class="small orange" x="852" y="606">5. base + 指令里的偏移 0x100</text>

  <rect x="42" y="616" width="504" height="96" rx="8" fill="#ffffff" stroke="#cbd5e1" stroke-width="2"/>
  <text class="label" x="70" y="652">关键关系</text>
  <text class="text" x="70" y="680">GDTR.Base 指向 GDT 起点；ES selector 取 Index=3，</text>
  <text class="text" x="70" y="704">命中 GDT[3] 后把 base 缓存进 ES.hidden，再加 offset。</text>
</svg>
