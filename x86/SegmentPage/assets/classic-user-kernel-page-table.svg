<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="620" viewBox="0 0 1080 620" role="img" aria-labelledby="title desc">
  <title id="title">传统 Linux 进程页表中的用户空间和内核空间映射</title>
  <desc id="desc">每个进程有自己的页表根。低地址部分映射各自的用户空间，高地址部分映射相同的内核空间。用户态不能访问 U/S 为 0 的内核页。</desc>
  <defs>
    <style>
      .bg { fill: #f8fafc; }
      .title { fill: #0f172a; font: 700 25px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
      .label { fill: #334155; font: 700 15px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
      .text { fill: #475569; font: 13px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
      .mono { fill: #0f172a; font: 13px ui-monospace, SFMono-Regular, Menlo, Consolas, monospace; }
      .proc { fill: #ffffff; stroke: #cbd5e1; stroke-width: 2; }
      .userA { fill: #eff6ff; stroke: #60a5fa; stroke-width: 2; }
      .userB { fill: #eef2ff; stroke: #818cf8; stroke-width: 2; }
      .kernel { fill: #ecfdf5; stroke: #34d399; stroke-width: 2; }
      .guard { fill: #f8fafc; stroke: #cbd5e1; stroke-dasharray: 6 5; stroke-width: 1.5; }
      .note { fill: #fff7ed; stroke: #f59e0b; stroke-width: 2; }
      .arrow { stroke: #2563eb; stroke-width: 2; fill: none; }
    </style>
  </defs>
  <rect class="bg" x="0" y="0" width="1080" height="620"/>
  <text class="title" x="44" y="54">KPTI 之前的常见模型：每个进程页表里都有用户映射和内核映射</text>

  <rect class="proc" x="78" y="104" width="410" height="384" rx="8"/>
  <text class="label" x="110" y="136">进程 A 的页表</text>
  <text class="mono" x="110" y="162">CR3 -> A 的 PML4</text>
  <rect class="kernel" x="126" y="190" width="314" height="96" rx="6"/>
  <text class="label" x="160" y="224">高地址：内核映射</text>
  <text class="text" x="160" y="250">kernel text/data/direct map/per-CPU</text>
  <text class="mono" x="160" y="272">U/S = 0</text>
  <rect class="guard" x="126" y="308" width="314" height="46" rx="6"/>
  <text class="text" x="202" y="336">中间大量未映射空洞</text>
  <rect class="userA" x="126" y="376" width="314" height="74" rx="6"/>
  <text class="label" x="160" y="408">低地址：A 的用户空间</text>
  <text class="text" x="160" y="432">代码 / 堆 / 栈 / 共享库</text>

  <rect class="proc" x="592" y="104" width="410" height="384" rx="8"/>
  <text class="label" x="624" y="136">进程 B 的页表</text>
  <text class="mono" x="624" y="162">CR3 -> B 的 PML4</text>
  <rect class="kernel" x="640" y="190" width="314" height="96" rx="6"/>
  <text class="label" x="674" y="224">高地址：同一套内核映射</text>
  <text class="text" x="674" y="250">指向相同的内核物理页</text>
  <text class="mono" x="674" y="272">U/S = 0</text>
  <rect class="guard" x="640" y="308" width="314" height="46" rx="6"/>
  <text class="text" x="716" y="336">中间大量未映射空洞</text>
  <rect class="userB" x="640" y="376" width="314" height="74" rx="6"/>
  <text class="label" x="674" y="408">低地址：B 的用户空间</text>
  <text class="text" x="674" y="432">和 A 不同的用户映射</text>

  <path class="arrow" d="M440 238 C494 206, 574 206, 640 238"/>
  <path class="arrow" d="M640 250 C574 282, 494 282, 440 250"/>
  <text class="text" x="452" y="312">内核映射在各进程页表中重复出现，通常指向同一批物理内核页</text>

  <rect class="note" x="118" y="526" width="844" height="48" rx="6"/>
  <text class="text" x="150" y="556">用户态运行时虽然页表里能“看见”内核虚拟地址范围，但 PTE.U/S=0，正常权限检查会禁止 Ring 3 访问。</text>
</svg>
