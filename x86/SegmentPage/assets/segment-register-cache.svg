<svg xmlns="http://www.w3.org/2000/svg" width="980" height="620" viewBox="0 0 980 620" role="img" aria-labelledby="title desc">
  <title id="title">加载段寄存器时刷新隐藏缓存</title>
  <desc id="desc">mov ds, ax 加载选择子后，CPU 用选择子的 Index 和 GDTR.Base 定位 GDT 描述符，做权限检查，再把 base、limit、权限缓存到 DS 的隐藏部分。之后用 DS 访存直接读取隐藏缓存。</desc>
  <defs>
    <marker id="arrow-blue" markerWidth="7" markerHeight="7" refX="6" refY="2.5" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L6,2.5 L0,5 Z" fill="#2563eb"/>
    </marker>
    <marker id="arrow-green" markerWidth="7" markerHeight="7" refX="6" refY="2.5" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L6,2.5 L0,5 Z" fill="#059669"/>
    </marker>
    <marker id="arrow-orange" markerWidth="7" markerHeight="7" refX="6" refY="2.5" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L6,2.5 L0,5 Z" fill="#d97706"/>
    </marker>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="130%">
      <feDropShadow dx="0" dy="3" stdDeviation="5" flood-color="#0f172a" flood-opacity="0.14"/>
    </filter>
    <style>
      .bg { fill: #f8fafc; }
      .panel { fill: #ffffff; stroke: #cbd5e1; stroke-width: 2; filter: url(#shadow); }
      .title { fill: #0f172a; font: 700 24px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
      .label { fill: #334155; font: 600 17px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
      .text { fill: #334155; font: 15px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
      .small { fill: #475569; font: 13px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
      .mono { fill: #0f172a; font: 15px ui-monospace, SFMono-Regular, Menlo, Consolas, monospace; }
      .mono-strong { fill: #0f172a; font: 700 17px ui-monospace, SFMono-Regular, Menlo, Consolas, monospace; }
      .blue { fill: #1d4ed8; }
      .green { fill: #047857; }
      .orange { fill: #b45309; }
      .muted { fill: #64748b; }
      .inst { fill: #eff6ff; stroke: #60a5fa; stroke-width: 2; }
      .gdt { fill: #ffffff; stroke: #cbd5e1; stroke-width: 2; }
      .hit { fill: #ecfdf5; stroke: #34d399; stroke-width: 2; }
      .reg-visible { fill: #eff6ff; stroke: #60a5fa; stroke-width: 2; }
      .reg-hidden { fill: #fff7ed; stroke: #f59e0b; stroke-width: 2; }
      .note { fill: #ffffff; stroke: #cbd5e1; stroke-width: 2; }
    </style>
  </defs>

  <rect class="bg" x="0" y="0" width="980" height="620"/>
  <text class="title" x="44" y="54">段寄存器加载时：查一次 GDT，然后缓存描述符</text>

  <rect class="inst" x="70" y="92" width="260" height="86" rx="8"/>
  <text class="label" x="96" y="128">指令</text>
  <text class="mono-strong" x="96" y="156">mov ds, ax</text>
  <text class="small muted" x="210" y="156">ax = 某个选择子</text>

  <rect class="panel" x="442" y="86" width="450" height="226" rx="8"/>
  <text class="label" x="472" y="124">内存里的 GDT</text>
  <text class="small muted" x="584" y="124">GDTR.Base + Index x 8 定位到这里</text>

  <rect class="gdt" x="472" y="150" width="390" height="42" rx="4"/>
  <text class="mono" x="496" y="177">...</text>

  <rect class="hit" x="472" y="192" width="390" height="70" rx="4"/>
  <text class="mono-strong green" x="496" y="224">GDT[Index]</text>
  <text class="mono-strong green" x="630" y="224">64 位段描述符</text>
  <text class="small green" x="496" y="248">base | limit | 权限 | 类型 | Present ...</text>

  <rect class="gdt" x="472" y="262" width="390" height="34" rx="4"/>
  <text class="mono" x="496" y="285">...</text>

  <rect class="panel" x="154" y="386" width="670" height="116" rx="8"/>
  <text class="label" x="184" y="426">DS 段寄存器</text>

  <rect class="reg-visible" x="184" y="448" width="190" height="34" rx="5"/>
  <text class="mono-strong blue" x="214" y="471">可见：selector</text>

  <rect class="reg-hidden" x="374" y="448" width="420" height="34" rx="5"/>
  <text class="mono-strong orange" x="432" y="471">隐藏部分：base | limit | 权限</text>

  <path d="M330 136 C384 136, 392 198, 466 214" fill="none" stroke="#2563eb" stroke-width="1.8" marker-end="url(#arrow-blue)"/>
  <rect x="350" y="162" width="68" height="22" rx="4" fill="#eff6ff" stroke="#93c5fd"/>
  <text class="small blue" x="363" y="178">1. 查表</text>

  <path d="M680 262 C680 330, 628 370, 604 444" fill="none" stroke="#059669" stroke-width="1.8" marker-end="url(#arrow-green)"/>
  <rect x="672" y="324" width="80" height="22" rx="4" fill="#ecfdf5" stroke="#86efac"/>
  <text class="small green" x="682" y="340">2. 检查缓存</text>

  <path d="M306 178 C282 258, 266 336, 266 444" fill="none" stroke="#2563eb" stroke-width="1.8" marker-end="url(#arrow-blue)"/>
  <rect x="216" y="292" width="82" height="22" rx="4" fill="#eff6ff" stroke="#93c5fd"/>
  <text class="small blue" x="230" y="308">保留 selector</text>

  <path d="M584 482 C584 526, 584 540, 584 558" fill="none" stroke="#d97706" stroke-width="1.8" marker-end="url(#arrow-orange)"/>
  <text class="small orange" x="610" y="534">以后 DS 访存直接读隐藏部分</text>

  <rect class="note" x="230" y="560" width="520" height="42" rx="6"/>
  <text class="text" x="256" y="586">不再重新查 GDT，除非再次加载 DS / ES / SS 等段寄存器</text>
</svg>
