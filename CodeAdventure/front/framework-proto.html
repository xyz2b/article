<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>一条代码的冒险之旅 · 框架原型 v3</title>
<style>
  :root{
    --bg:#0c1016; --panel:#141a22; --panel2:#1b232e; --border:#283039;
    --text:#c9d1d9; --dim:#8b949e; --faint:#525a64;
    --accent:#58a6ff; --hot:#f0883e; --add:#3fb950; --change:#bb8009;
    --green:#238636; --text-seg:#a371f7; --heap:#3fb9b0; --rodata:#d29922; --data:#db6d28;
    --mono:"SF Mono",ui-monospace,"JetBrains Mono",Menlo,Consolas,monospace;
    --rowh:34px;
  }
  *{box-sizing:border-box}
  html,body{margin:0}
  body{background:var(--bg);color:var(--text);
    font-family:-apple-system,system-ui,"PingFang SC","Microsoft YaHei",sans-serif;
    font-size:14px;line-height:1.5;}
  .wrap{max-width:1800px;margin:0 auto;padding:14px 24px 50px}
  h1.t{font-size:18px;margin:0 0 2px;font-weight:700}
  .sub{color:var(--dim);font-size:12.5px;margin:0 0 14px}
  .controls{display:flex;gap:8px;align-items:center;flex-wrap:wrap;
    padding:9px 14px;margin-bottom:12px;
    background:var(--panel);border:1px solid var(--border);border-radius:10px;}
  button{font:inherit;background:var(--panel2);color:var(--text);
    border:1px solid var(--border);border-radius:7px;padding:6px 12px;cursor:pointer;transition:.12s;}
  button:hover:not(:disabled){border-color:var(--accent);color:#fff}
  button:active:not(:disabled){transform:scale(.96)}
  button:disabled{opacity:.35;cursor:default}
  button.primary{background:var(--green);border-color:var(--green);color:#fff}
  .step-count{color:var(--dim);font-variant-numeric:tabular-nums;min-width:70px;text-align:center;margin-left:auto}
  input[type=range]{width:120px;accent-color:var(--accent)}

  .layout{display:grid;grid-template-columns:330px 1fr;gap:14px;align-items:start}
  @media(max-width:980px){.layout{grid-template-columns:1fr}}
  .panel{background:var(--panel);border:1px solid var(--border);border-radius:12px;overflow:hidden}
  .panel .ttl{padding:8px 14px;border-bottom:1px solid var(--border);font-size:11px;font-weight:600;color:var(--dim);text-transform:uppercase;letter-spacing:.5px;display:flex;align-items:center;gap:8px}
  .panel .ttl .tabs{margin-left:auto;display:flex;gap:4px}
  .panel .ttl .tab{font-size:10px;padding:2px 8px;border-radius:5px;cursor:pointer;border:1px solid var(--border);color:var(--faint);text-transform:none;letter-spacing:0}
  .panel .ttl .tab.on{color:#fff;border-color:var(--hot);background:rgba(240,136,62,.16)}
  .panel .bd{padding:10px 12px}

  /* 代码面板 + RIP 行内箭头 */
  #code-bd{position:relative;padding-left:26px;max-height:560px;overflow-y:auto;scroll-behavior:smooth}
  pre.code{margin:0;font-family:var(--mono);font-size:12px;line-height:1.65;overflow-x:auto}
  .cline{display:block;padding:1px 8px;border-radius:5px;white-space:pre;color:var(--text);transition:.15s}
  .cline.active{background:rgba(88,166,255,.16);box-shadow:inset 2px 0 0 var(--accent)}
  .ckw{color:#ff7b72}.ctype{color:#79c0ff}.cnum{color:#a5d6ff}.cfn{color:#d2a8ff}
  .asm-row{display:flex;gap:8px;font-family:var(--mono);font-size:11.5px;padding:3px 4px;border-radius:5px;align-items:baseline;transition:.15s}
  .asm-row.active{background:rgba(240,136,62,.16);box-shadow:inset 2px 0 0 var(--hot)}
  .asm-addr{color:var(--faint);flex:0 0 24px}
  .asm-bytes{color:var(--dim);flex:0 0 auto;white-space:nowrap}
  .asm-text{flex:1 1 auto;white-space:nowrap}
  #code-bd.bytes .asm-text{text-align:right}
  .asm-text .reg{color:#ffa657}.asm-text .imm{color:#a5d6ff}.asm-text .op{color:var(--accent)}
  #rip-code{position:absolute;left:2px;display:flex;align-items:center;gap:1px;font-family:var(--mono);font-size:9px;font-weight:700;color:var(--hot);transform:translateY(-50%);transition:top .4s cubic-bezier(.4,0,.2,1),opacity .2s;pointer-events:none}
  #rip-code .arw{font-size:12px}

  /* 设备画布 */
  .stage{position:relative;min-height:480px;padding:16px;display:flex;align-items:stretch;justify-content:flex-start;gap:0;
    background:repeating-linear-gradient(0deg,transparent 0 31px,rgba(255,255,255,.012) 31px 32px),repeating-linear-gradient(90deg,transparent 0 31px,rgba(255,255,255,.012) 31px 32px);}
  .device{align-self:flex-start;background:var(--panel2);border:1px solid var(--border);border-radius:10px;transition:.3s;position:relative;z-index:2}
  .device.cpu{flex:0 0 268px;width:268px}.device.mem{flex:1 1 auto;min-width:0}
  .device .dh{display:flex;align-items:center;gap:7px;padding:8px 12px;border-bottom:1px solid var(--border);font-family:var(--mono);font-size:12px;font-weight:700}
  .device.cpu .dh{color:var(--hot)}.device.mem .dh{color:var(--accent)}
  .device .db{padding:11px 12px}
  .device.cpu{box-shadow:0 0 0 1px rgba(240,136,62,.5)}
  .device.mem{box-shadow:0 0 0 1px rgba(88,166,255,.4)}

  /* CPU 内部 */
  .ph{margin-left:auto;display:flex;gap:3px}
  .ph i{font-style:normal;font-size:8.5px;padding:1px 5px;border-radius:4px;border:1px solid var(--border);color:var(--faint);font-weight:600}
  .ph i.on{color:#fff;border-color:var(--hot);background:rgba(240,136,62,.2)}
  .reg-grid{display:grid;grid-template-columns:1fr 1fr;gap:6px}
  .reg-box{background:rgba(10,14,20,.5);border:1px solid var(--border);border-radius:6px;padding:5px 8px;transition:.18s}
  .reg-box.changed{border-color:var(--change);background:rgba(187,128,9,.18);box-shadow:0 0 0 1px var(--change)}
  .reg-name{font-family:var(--mono);font-size:10px;color:var(--accent);font-weight:600}
  .reg-val{font-family:var(--mono);font-size:14px;color:#fff;font-variant-numeric:tabular-nums;line-height:1.25}
  .reg-box.rip .reg-name,.reg-box.rip .reg-val{color:var(--hot)}
  .reg-box.rsp .reg-name{color:var(--hot)}.reg-box.rbp .reg-name{color:var(--add)}

  /* ── 统一地址空间尺子 ── */
  .addr-space{position:relative}
  /* 三列地址空间 */
  .addr-space.cols3{display:grid;grid-template-columns:minmax(190px,1.1fr) minmax(150px,1fr) minmax(170px,1fr);gap:12px;align-items:start}
  .mem-col{min-width:0}
  .mem-col-hd{font-family:var(--mono);font-size:9.5px;color:var(--faint);font-weight:700;letter-spacing:.5px;text-align:center;padding:2px 0 6px;border-bottom:1px dashed var(--border);margin-bottom:7px}
  @media(max-width:1100px){.addr-space.cols3{grid-template-columns:1fr 1fr;}.mem-col:first-child{grid-column:1/-1}}

  /* 段条带(折叠态)*/
  .seg2{margin:0;border:1px solid var(--border);border-left-width:3px;border-radius:7px;margin-bottom:5px;
    background:rgba(10,14,20,.4);overflow:hidden;transition:.2s}
  .seg2 .seghd{display:flex;align-items:center;gap:8px;padding:7px 10px;cursor:pointer;user-select:none;font-family:var(--mono);font-size:11px}
  .seg2 .seghd:hover{background:rgba(255,255,255,.03)}
  .seg2 .seghd .caret{color:var(--faint);font-size:9px;transition:.2s;width:9px}
  .seg2.open .seghd .caret{transform:rotate(90deg)}
  .seg2 .seghd .sn{font-weight:700}
  .seg2 .seghd .srange{color:var(--faint);font-size:9px;margin-left:auto}
  .seg2 .seghd .sgrow{color:var(--faint);font-size:9px;font-style:italic}
  .seg2 .segbody{display:none;padding:6px 10px 9px;border-top:1px solid var(--border)}
  .seg2.open .segbody{display:block}
  .seg2.active{box-shadow:0 0 0 1px currentColor inset}
  /* 未涉及的段:置黑、压暗、不可展开重点 */
  .seg2.dark{opacity:.4;filter:grayscale(.6)}
  .seg2.dark .seghd{cursor:default}
  .seg2.dark:hover{opacity:.6}
  #rip-code.hide{opacity:0}
  /* 段配色(用 border-left + 文字)*/
  .seg2.s-stack{border-left-color:var(--accent);color:var(--accent)}
  .seg2.s-mmap{border-left-color:var(--faint);color:var(--dim)}
  .seg2.s-heap{border-left-color:var(--heap);color:var(--heap)}
  .seg2.s-bss{border-left-color:var(--data);color:var(--data)}
  .seg2.s-data{border-left-color:var(--data);color:var(--data)}
  .seg2.s-rodata{border-left-color:var(--rodata);color:var(--rodata)}
  .seg2.s-text{border-left-color:var(--text-seg);color:var(--text-seg)}
  .seg2 .seghd .sn{color:inherit}
  .seg2 .segbody{color:var(--text)}

  /* 段内的格子复用 mrow */
  .mcol{position:relative;padding-right:70px}
  .mrow{position:relative;border:1px solid var(--border);border-radius:6px;background:rgba(10,14,20,.5);
    font-family:var(--mono);font-size:11px;padding:5px 9px;margin:3px 0;min-height:var(--rowh);
    display:flex;justify-content:space-between;align-items:center;gap:8px;transition:.25s}
  .mrow .mleft{min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .mrow .maddr{color:var(--faint);font-size:9.5px}
  .mrow .mname{color:var(--dim)}
  .mrow .mval{color:#fff;font-weight:600;font-size:12.5px}
  .mrow.changed{border-color:var(--change);background:rgba(187,128,9,.16);box-shadow:0 0 0 1px var(--change)}
  .mrow.fr-main{border-left:3px solid var(--accent)}
  .mrow.fr-add{border-left:3px solid var(--add)}
  .mrow.fr-caller{border-left:3px solid var(--faint)}
  .mrow.fr-bridge{border-left:3px solid var(--hot)}
  .mrow.text-row{border-left:3px solid var(--text-seg)}
  .mrow.text-row.cur{background:rgba(163,113,247,.14);border-color:var(--text-seg)}
  .mrow.free{border-style:dashed;opacity:.36}.mrow.free .mval{display:none}

  /* 内存上的指针标签:按目标槽分组,同指一格的竖排成摞 */
  .mptr-group{position:absolute;right:2px;display:flex;align-items:center;gap:4px;
    transform:translateY(-50%);transition:top .4s cubic-bezier(.4,0,.2,1);pointer-events:none;z-index:6}
  .mptr-group .garw{font-size:13px;line-height:1;color:var(--faint)}
  .mptr-stack{display:flex;flex-direction:column;gap:3px;align-items:flex-start}
  .mptr{display:flex;align-items:center;font-family:var(--mono);font-size:10px;font-weight:700;
    padding:1px 6px;border-radius:5px;white-space:nowrap;line-height:1.4}
  .mptr.rsp{background:rgba(240,136,62,.22);color:var(--hot);border:1px solid var(--hot)}
  .mptr.rbp{background:rgba(63,185,80,.2);color:var(--add);border:1px solid var(--add)}
  .mptr.rip{background:rgba(163,113,247,.2);color:var(--text-seg);border:1px solid var(--text-seg)}

  /* 总线 + 拖尾 */
  .bus{position:relative;width:74px;align-self:center;flex:0 0 auto;height:120px}
  .bus svg{position:absolute;inset:0;width:100%;height:100%;overflow:visible}
  .bus .rail{stroke:var(--border);stroke-width:2;fill:none}
  .bus .rail.lit{stroke:var(--hot);filter:drop-shadow(0 0 4px var(--hot))}
  .bus .blabel{position:absolute;top:42%;left:50%;transform:translate(-50%,-50%);
    font-family:var(--mono);font-size:9px;color:var(--hot);background:var(--bg);
    padding:1px 4px;border-radius:4px;white-space:nowrap;opacity:0;transition:.2s}
  .bus .blabel.show{opacity:1}

  .narr{margin-top:14px;background:var(--panel);border:1px solid var(--border);border-radius:10px;padding:11px 15px;display:flex;gap:13px;align-items:flex-start}
  .narr .badge{flex:0 0 auto;font-family:var(--mono);font-size:12px;font-weight:600;padding:4px 10px;border-radius:6px;background:rgba(240,136,62,.18);color:var(--hot);border:1px solid var(--hot);white-space:nowrap}
  .narr .badge.done{background:rgba(63,185,80,.18);color:var(--add);border-color:var(--add)}
  .narr .text code{font-family:var(--mono);background:var(--panel2);padding:1px 5px;border-radius:4px;color:#79c0ff;font-size:12px}
  .legend{display:flex;gap:14px;flex-wrap:wrap;font-size:11px;color:var(--dim);margin-top:12px}
  .legend span{display:inline-flex;align-items:center;gap:5px}
  .dot{width:11px;height:11px;border-radius:3px;display:inline-block}
</style>
</head>
<body>
<div class="wrap">
  <h1 class="t">一条代码的冒险之旅 · 框架 v3</h1>
  <p class="sub">统一地址空间:代码段·栈同在一根内存尺上 · RIP/RSP/RBP 三指针就地标注 · add(3,4) 真实编译产物</p>
  <div class="controls">
    <button id="reset">⏮ 重置</button>
    <button id="prev">← 上一步</button>
    <button id="next" class="primary">下一步 →</button>
    <button id="auto">▶ 自动</button>
    <label style="font-size:11px;color:var(--dim)">速度<input type="range" id="speed" min="300" max="2000" value="1100"></label>
    <span class="step-count" id="counter">0 / 0</span>
  </div>
  <div class="layout">
    <div class="panel">
      <div class="ttl">代码
        <div class="tabs">
          <span class="tab" data-track="c">C</span>
          <span class="tab on" data-track="asm">汇编</span>
          <span class="tab" data-track="bytes">机器码</span>
        </div>
      </div>
      <div class="bd" id="code-bd"></div>
    </div>
    <div class="panel">
      <div class="ttl">硬件全景 · 当前参与的设备</div>
      <div class="stage" id="stage"></div>
    </div>
  </div>
  <div class="narr">
    <span class="badge" id="badge">步骤 0</span>
    <div class="text" id="narr-text">点「下一步」开始。右侧内存是一根完整地址尺:底部 .text 代码段(RIP 在此爬行),顶部栈(RSP/RBP 在此起落)。</div>
  </div>
  <div class="legend">
    <span><i class="dot" style="background:var(--text-seg)"></i>代码段 / RIP</span>
    <span><i class="dot" style="background:var(--hot)"></i>RSP / 热点</span>
    <span><i class="dot" style="background:var(--add)"></i>RBP / add 帧</span>
    <span><i class="dot" style="background:var(--accent)"></i>main 帧</span>
    <span><i class="dot" style="background:var(--change)"></i>本步变化</span>
  </div>
</div>
<script>
const C_SRC=[
  '<span class="ctype">int</span> <span class="cfn">add</span>(<span class="ctype">int</span> a, <span class="ctype">int</span> b) {',
  '    <span class="ctype">int</span> c = a + b;',
  '    <span class="ckw">return</span> c;','}','',
  '<span class="ctype">int</span> <span class="cfn">main</span>(<span class="ctype">void</span>) {',
  '    <span class="ctype">int</span> x = <span class="cfn">add</span>(<span class="cnum">3</span>, <span class="cnum">4</span>);',
  '    <span class="ckw">return</span> x;','}'];
const ASM=[
  // main
  {fn:'main',addr:'20',bytes:'55',         text:'pushq <span class="reg">%rbp</span>'},
  {fn:'main',addr:'21',bytes:'48 89 e5',   text:'movq  <span class="reg">%rsp</span>, <span class="reg">%rbp</span>'},
  {fn:'main',addr:'24',bytes:'48 83 ec 10',text:'subq  <span class="imm">$0x10</span>, <span class="reg">%rsp</span>'},
  {fn:'main',addr:'28',bytes:'c7 45 fc 00',text:'movl  <span class="imm">$0x0</span>, <span class="op">-4</span>(<span class="reg">%rbp</span>)'},
  {fn:'main',addr:'2f',bytes:'bf 03 00 00',text:'movl  <span class="imm">$0x3</span>, <span class="reg">%edi</span>'},
  {fn:'main',addr:'34',bytes:'be 04 00 00',text:'movl  <span class="imm">$0x4</span>, <span class="reg">%esi</span>'},
  {fn:'main',addr:'39',bytes:'e8 ..',      text:'callq <span class="op">add</span>'},
  // add
  {fn:'add', addr:'0', bytes:'55',         text:'pushq <span class="reg">%rbp</span>'},
  {fn:'add', addr:'1', bytes:'48 89 e5',   text:'movq  <span class="reg">%rsp</span>, <span class="reg">%rbp</span>'},
  {fn:'add', addr:'4', bytes:'89 7d fc',   text:'movl  <span class="reg">%edi</span>, <span class="op">-4</span>(<span class="reg">%rbp</span>)'},
  {fn:'add', addr:'7', bytes:'89 75 f8',   text:'movl  <span class="reg">%esi</span>, <span class="op">-8</span>(<span class="reg">%rbp</span>)'},
  {fn:'add', addr:'a', bytes:'8b 45 fc',   text:'movl  <span class="op">-4</span>(<span class="reg">%rbp</span>), <span class="reg">%eax</span>'},
  {fn:'add', addr:'d', bytes:'03 45 f8',   text:'addl  <span class="op">-8</span>(<span class="reg">%rbp</span>), <span class="reg">%eax</span>'},
  {fn:'add', addr:'10',bytes:'89 45 f4',   text:'movl  <span class="reg">%eax</span>, <span class="op">-c</span>(<span class="reg">%rbp</span>)'},
  {fn:'add', addr:'13',bytes:'8b 45 f4',   text:'movl  <span class="op">-c</span>(<span class="reg">%rbp</span>), <span class="reg">%eax</span>'},
  {fn:'add', addr:'16',bytes:'5d',         text:'popq  <span class="reg">%rbp</span>'},
  {fn:'add', addr:'17',bytes:'c3',         text:'retq'},
  // main 续
  {fn:'main',addr:'3e',bytes:'89 45 f8',   text:'movl  <span class="reg">%eax</span>, <span class="op">-8</span>(<span class="reg">%rbp</span>)'},
  {fn:'main',addr:'41',bytes:'8b 45 f8',   text:'movl  <span class="op">-8</span>(<span class="reg">%rbp</span>), <span class="reg">%eax</span>'},
  {fn:'main',addr:'44',bytes:'48 83 c4 10',text:'addq  <span class="imm">$0x10</span>, <span class="reg">%rsp</span>'},
  {fn:'main',addr:'48',bytes:'5d',         text:'popq  <span class="reg">%rbp</span>'},
  {fn:'main',addr:'49',bytes:'c3',         text:'retq'},
];
const REG_DEFS=[{k:'rip',cls:'rip'},{k:'eax',cls:'eax'},{k:'rsp',cls:'rsp'},{k:'rbp',cls:'rbp'},{k:'edi',cls:''},{k:'esi',cls:''}];

// 栈槽位:高地址→低地址(index 0 = 最高)。rspSlot 决定哪些槽"在册"(0..rspSlot)。
const SLOTS=[
  {id:'ret_main', addr:'..ff10',name:'main 返回地址',     frame:'caller'},
  {id:'srbp_main',addr:'..ff08',name:'存起来的上层 %rbp', frame:'main'},
  {id:'mret',     addr:'..fffc',name:'返回值槽 @ -4(rbp)',frame:'main'},
  {id:'x',        addr:'..fff8',name:'x @ -8(rbp)',       frame:'main'},
  {id:'ret_add',  addr:'..ffe8',name:'add 返回地址 = 0x3e',frame:'bridge'},
  {id:'srbp_add', addr:'..ffe0',name:'存起来的 main %rbp', frame:'add'},
  {id:'a',        addr:'..ffdc',name:'a @ -4(rbp)',       frame:'add'},
  {id:'b',        addr:'..ffd8',name:'b @ -8(rbp)',       frame:'add'},
  {id:'c',        addr:'..ffd4',name:'c @ -c(rbp)',       frame:'add'},
];
const SLOT_IX={};SLOTS.forEach((s,i)=>SLOT_IX[s.id]=i);
const TEXT_ROWS=ASM.map((a,i)=>({addr:a.addr,i}));


// ── 进程虚拟地址空间:从高地址到低地址的完整段布局 ──
const SEGMENTS=[
  {id:'stack', name:'栈 stack',        range:'0x7fff…',  grow:'↓ 向下生长',        cls:'s-stack', kind:'stack'},
  {id:'mmap',  name:'mmap 映射区',      range:'0x7f…',    grow:'共享库/匿名映射',   cls:'s-mmap',  note:'动态库(libc 等)、mmap 大块内存映射在此。本例未用到。'},
  {id:'heap',  name:'堆 heap',          range:'0x555…+',  grow:'↑ 向上生长',        cls:'s-heap',  note:'malloc/new 从这里分配。本例没有动态分配,堆为空。'},
  {id:'bss',   name:'.bss 未初始化',    range:'0x555…',   grow:'清零的全局/静态',   cls:'s-bss',   note:'未初始化的全局/静态变量,加载时清零。本例无。'},
  {id:'data',  name:'.data 已初始化',   range:'0x555…',   grow:'可读写全局',        cls:'s-data',  note:'带初值的全局/静态变量。本例无。'},
  {id:'rodata',name:'.rodata 只读数据', range:'0x555…',   grow:'常量/字符串字面量', cls:'s-rodata',note:'字符串字面量、const 常量。本例无。'},
  {id:'text',  name:'.text 代码段',     range:'0x555…',   grow:'RIP 在此·只读可执行',cls:'s-text',  kind:'text'},
];


// 步骤:rspAt/rbpAt = 指针停在哪个栈格 id(或 'top'=栈顶空位之上)
// 步骤模型:i=ASM下标;live=当前在册栈槽id(高→低);rspAt/rbpAt=指针所在槽(null=不在图上);
// vals 累积合并;slotChanged=本步变动的槽;flow=总线方向。
function S(o){return Object.assign({phase:'execute',devices:['cpu','mem'],activeSegs:['stack','text'],flow:null,changed:[],slotChanged:[],vals:{}},o);}
const L0=['ret_main'];
const Lmain=['ret_main','srbp_main','mret','x'];
const Lcall=Lmain.concat('ret_add');
const Ladd=Lcall.concat('srbp_add','a','b','c');
const STEPS=[
  // ── 第一幕:main 建帧 ──
  S({i:0,live:['ret_main','srbp_main'],rspAt:'srbp_main',rbpAt:null,
     regs:{rip:'0x20',eax:'?',rsp:'..ff08',rbp:'(上层)',edi:'?',esi:'?'},
     vals:{ret_main:'→runtime',srbp_main:'旧 rbp'},slotChanged:['srbp_main'],
     narr:'<b>main: pushq %rbp</b> — 程序从 main 开始(运行时已 callq main,返回地址在栈)。先把上层基准线压栈保管。',changed:['rip','rsp']}),
  S({i:1,live:['ret_main','srbp_main'],rspAt:'srbp_main',rbpAt:'srbp_main',
     regs:{rip:'0x21',eax:'?',rsp:'..ff08',rbp:'..ff08',edi:'?',esi:'?'},
     vals:{ret_main:'→runtime',srbp_main:'旧 rbp'},
     narr:'<b>main: movq %rsp,%rbp</b> — RBP 钉在栈顶,成为 main 的基准线。',changed:['rip','rbp']}),
  S({i:2,live:Lmain,rspAt:'x',rbpAt:'srbp_main',
     regs:{rip:'0x24',eax:'?',rsp:'..fff8',rbp:'..ff08',edi:'?',esi:'?'},
     vals:{ret_main:'→runtime',srbp_main:'旧 rbp'},slotChanged:['mret','x'],
     narr:'<b>main: subq $0x10,%rsp</b> — 栈顶下移 16 字节,给局部变量挖空地(返回值槽 + x)。',changed:['rip','rsp']}),
  S({i:3,live:Lmain,rspAt:'x',rbpAt:'srbp_main',flow:{dir:'w',label:'0 →返回值槽'},
     regs:{rip:'0x28',eax:'?',rsp:'..fff8',rbp:'..ff08',edi:'?',esi:'?'},
     vals:{mret:'0'},slotChanged:['mret'],
     narr:'<b>main: movl $0x0,-4(%rbp)</b> — 返回值槽填 0。',changed:['rip']}),
  S({i:4,live:Lmain,rspAt:'x',rbpAt:'srbp_main',
     regs:{rip:'0x2f',eax:'?',rsp:'..fff8',rbp:'..ff08',edi:'3',esi:'?'},
     narr:'<b>main: movl $0x3,%edi</b> — 备第一个参数 a=3 进 <code>%edi</code>(调用约定)。',changed:['rip','edi']}),
  S({i:5,live:Lmain,rspAt:'x',rbpAt:'srbp_main',
     regs:{rip:'0x34',eax:'?',rsp:'..fff8',rbp:'..ff08',edi:'3',esi:'4'},
     narr:'<b>main: movl $0x4,%esi</b> — 备第二个参数 b=4 进 <code>%esi</code>。',changed:['rip','esi']}),
  // ── 第二幕:调用 add ──
  S({i:6,live:Lcall,rspAt:'ret_add',rbpAt:'srbp_main',
     regs:{rip:'→0x0',eax:'?',rsp:'..ffe8',rbp:'..ff08',edi:'3',esi:'4'},
     vals:{ret_add:'0x3e'},slotChanged:['ret_add'],
     narr:'<b>main: callq add</b> — 压入返回地址 0x3e 当路标,RIP 跳进 add。栈帧开始往下叠。',changed:['rip','rsp']}),
  S({i:7,live:Ladd.slice(0,6),rspAt:'srbp_add',rbpAt:'srbp_main',
     regs:{rip:'0x1',eax:'?',rsp:'..ffe0',rbp:'..ff08',edi:'3',esi:'4'},
     vals:{srbp_add:'main rbp'},slotChanged:['srbp_add'],
     narr:'<b>add: pushq %rbp</b> — 替 main 保管基准线。RBP 此刻还指 main。',changed:['rip','rsp']}),
  S({i:8,live:Ladd.slice(0,6),rspAt:'srbp_add',rbpAt:'srbp_add',
     regs:{rip:'0x4',eax:'?',rsp:'..ffe0',rbp:'..ffe0',edi:'3',esi:'4'},
     vals:{srbp_add:'main rbp'},
     narr:'<b>add: movq %rsp,%rbp</b> — 基准线易主:RBP 归 add,和 RSP 重合。add 的帧立起来了。',changed:['rip','rbp']}),
  S({i:9,live:Ladd,rspAt:'srbp_add',rbpAt:'srbp_add',flow:{dir:'w',label:'a=3 →栈'},
     regs:{rip:'0x7',eax:'?',rsp:'..ffe0',rbp:'..ffe0',edi:'3',esi:'4'},
     vals:{a:'3'},slotChanged:['a'],
     narr:'<b>add: movl %edi,-4(%rbp)</b> — a(3)写到栈(红区,RSP 不动)。<span style="color:var(--hot)">数据 CPU→内存</span>。',changed:['rip']}),
  S({i:10,live:Ladd,rspAt:'srbp_add',rbpAt:'srbp_add',flow:{dir:'w',label:'b=4 →栈'},
     regs:{rip:'0xa',eax:'?',rsp:'..ffe0',rbp:'..ffe0',edi:'3',esi:'4'},
     vals:{b:'4'},slotChanged:['b'],
     narr:'<b>add: movl %esi,-8(%rbp)</b> — b(4)写到栈。',changed:['rip']}),
  S({i:11,live:Ladd,rspAt:'srbp_add',rbpAt:'srbp_add',flow:{dir:'r',label:'读 a →eax'},
     regs:{rip:'0xd',eax:'3',rsp:'..ffe0',rbp:'..ffe0',edi:'3',esi:'4'},
     vals:{a:'3',b:'4'},
     narr:'<b>add: movl -4(%rbp),%eax</b> — a 读回 <code>%eax</code>。<span style="color:var(--hot)">数据 内存→CPU</span>。',changed:['rip','eax']}),
  S({i:12,live:Ladd,rspAt:'srbp_add',rbpAt:'srbp_add',flow:{dir:'r',label:'+b'},
     regs:{rip:'0x10',eax:'7',rsp:'..ffe0',rbp:'..ffe0',edi:'3',esi:'4'},
     vals:{a:'3',b:'4'},
     narr:'<b>add: addl -8(%rbp),%eax</b> — 「+」的真身 <code>03 45 f8</code>:eax = 3+4 = <b style="color:var(--add)">7</b>。',changed:['rip','eax']}),
  S({i:13,live:Ladd,rspAt:'srbp_add',rbpAt:'srbp_add',flow:{dir:'w',label:'c=7 →栈'},
     regs:{rip:'0x13',eax:'7',rsp:'..ffe0',rbp:'..ffe0',edi:'3',esi:'4'},
     vals:{c:'7'},slotChanged:['c'],
     narr:'<b>add: movl %eax,-c(%rbp)</b> — 结果 7 写回栈格 c。',changed:['rip']}),
  S({i:14,live:Ladd,rspAt:'srbp_add',rbpAt:'srbp_add',flow:{dir:'r',label:'c →eax'},
     regs:{rip:'0x16',eax:'7',rsp:'..ffe0',rbp:'..ffe0',edi:'3',esi:'4'},
     vals:{c:'7'},
     narr:'<b>add: movl -c(%rbp),%eax</b> — 把返回值放进 <code>%eax</code>(返回值信箱)。',changed:['rip','eax']}),
  // ── 第三幕:add 返回、拆帧 ──
  S({i:15,live:Lcall,rspAt:'ret_add',rbpAt:'srbp_main',
     regs:{rip:'0x17',eax:'7',rsp:'..ffe8',rbp:'..ff08',edi:'3',esi:'4'},
     narr:'<b>add: popq %rbp</b> — 基准线还给 main。add 的红区(a/b/c)随帧作废。',changed:['rip','rsp','rbp']}),
  S({i:16,live:Lmain,rspAt:'x',rbpAt:'srbp_main',
     regs:{rip:'→0x3e',eax:'7',rsp:'..fff8',rbp:'..ff08',edi:'3',esi:'4'},
     narr:'<b>add: retq</b> — 弹出路标 0x3e 回 main。add 帧整块拆掉,只有 <code>%eax</code> 的 <b style="color:var(--add)">7</b> 带回去。',changed:['rip','rsp']}),
  S({i:17,live:Lmain,rspAt:'x',rbpAt:'srbp_main',flow:{dir:'w',label:'eax →x'},
     regs:{rip:'0x41',eax:'7',rsp:'..fff8',rbp:'..ff08',edi:'3',esi:'4'},
     vals:{x:'7'},slotChanged:['x'],
     narr:'<b>main: movl %eax,-8(%rbp)</b> — 从信箱取 7 存进 x。<code>int x=add(3,4)</code> 到此完成。',changed:['rip']}),
  S({i:18,live:Lmain,rspAt:'x',rbpAt:'srbp_main',flow:{dir:'r',label:'读 x →eax'},
     regs:{rip:'0x44',eax:'7',rsp:'..fff8',rbp:'..ff08',edi:'3',esi:'4'},
     vals:{x:'7'},
     narr:'<b>main: movl -8(%rbp),%eax</b> — 取 x 当 main 自己的返回值。',changed:['rip','eax']}),
  S({i:19,live:['ret_main','srbp_main'],rspAt:'srbp_main',rbpAt:'srbp_main',
     regs:{rip:'0x48',eax:'7',rsp:'..ff08',rbp:'..ff08',edi:'3',esi:'4'},
     narr:'<b>main: addq $0x10,%rsp</b> — 填回挖的 16 字节,main 的局部变量区作废。',changed:['rip','rsp']}),
  S({i:20,live:['ret_main'],rspAt:'ret_main',rbpAt:null,
     regs:{rip:'0x49',eax:'7',rsp:'..ff10',rbp:'(上层)',edi:'3',esi:'4'},
     narr:'<b>main: popq %rbp</b> — 还原上层基准线。',changed:['rip','rsp','rbp']}),
  S({i:21,live:[],rspAt:null,rbpAt:null,done:true,
     regs:{rip:'→runtime',eax:'7',rsp:'..ff18',rbp:'(上层)',edi:'3',esi:'4'},
     narr:'<b>main: retq</b> — 交还控制权给运行时。整个栈面回到程序启动前。涨上去的每一步都对称地退了回来。',changed:['rip']}),
];


let track='asm',cur=0,timer=null,autoOn=false;
const $=id=>document.getElementById(id);
const codeBd=$('code-bd');

function renderCode(activeI){
  if(track==='c'){
    const cl=STEPS[cur].i!=null?(ASM[STEPS[cur].i].fn==='add'?1:6):1;
    codeBd.innerHTML='<pre class="code">'+C_SRC.map((l,i)=>
      `<span class="cline${i===cl?' active':''}">${l||' '}</span>`).join('')+'</pre>';
    return;
  }
  let last=null,html='';
  codeBd.classList.toggle('bytes',track==='bytes');
  ASM.forEach((a,i)=>{
    if(a.fn!==last){html+=`<div style="font-family:var(--mono);font-size:10px;color:var(--add);margin:7px 0 2px;font-weight:700">${a.fn}:</div>`;last=a.fn;}
    const on=i===activeI?' active':'';
    const A=`<span class="asm-bytes">${a.bytes}</span>`,B=`<span class="asm-text">${a.text}</span>`;
    html+=`<div class="asm-row${on}" data-i="${i}"><span class="asm-addr">${a.addr}:</span>${track==='bytes'?A+B:B+A}</div>`;
  });
  codeBd.innerHTML=html+'<div id="rip-code"><span class="arw">▶</span>RIP</div>';
  requestAnimationFrame(()=>{
    const row=codeBd.querySelector(`.asm-row[data-i="${activeI}"]`),rip=$('rip-code');
    if(row&&rip){
      rip.style.top=(row.offsetTop+row.offsetHeight/2)+'px';rip.classList.remove('hide');
      // 将当前行滚动到视觉中心
      const target=row.offsetTop-(codeBd.clientHeight/2)+(row.offsetHeight/2);
      codeBd.scrollTo({top:Math.max(0,target),behavior:'smooth'});
    }
    else if(rip)rip.classList.add('hide');
  });
}

// CPU 面板
function cpuHTML(s){
  const regs=REG_DEFS.map(r=>`<div class="reg-box ${r.cls}${(s.changed||[]).includes(r.k)?' changed':''}">
    <div class="reg-name">%${r.k}</div><div class="reg-val">${s.regs[r.k]}</div></div>`).join('');
  const ph=['fetch','decode','execute'].map(p=>`<i class="${p===s.phase?'on':''}">${({fetch:'取指',decode:'译码',execute:'执行'})[p]}</i>`).join('');
  return `<div class="device cpu"><div class="dh"><span>⬢</span>CPU<div class="ph">${ph}</div></div>
    <div class="db"><div class="reg-grid">${regs}</div></div></div>`;
}

// 统一地址空间:所有段粗略列出(折叠),点击或当前步涉及则展开
const openSegs=new Set(['stack','heap']); // 默认只展开栈+堆(有数据才展开)
function cumVals(){const v={};for(let i=0;i<=cur;i++)Object.assign(v,STEPS[i].vals||{});return v;}
function segBodyHTML(seg,s){
  if(seg.kind==='stack'){
    const vals=cumVals(),live=s.live||[],chg=s.slotChanged||[];
    if(!live.length) return `<div style="font-size:10.5px;color:var(--faint);font-family:var(--mono);text-align:center;padding:6px">— 栈已清空,回到启动前 —</div>`;
    // 按 SLOTS 顺序(高→低),只渲染在册的
    const rows=SLOTS.filter(sl=>live.includes(sl.id)).map(sl=>{
      const v=vals[sl.id];
      return `<div class="mrow fr-${sl.frame}${chg.includes(sl.id)?' changed':''}" data-sid="${sl.id}">
        <span class="mleft"><span class="maddr">${sl.addr}</span> <span class="mname">${sl.name}</span></span>
        <span class="mval">${v==null?'':v}</span></div>`;
    }).join('');
    return `<div class="mcol" id="stk-col">${rows}</div>`;
  }
  if(seg.kind==='text'){
    let last=null,rows='';
    ASM.forEach((a,i)=>{
      const op=a.text.replace(/<[^>]+>/g,'').trim();
      rows+=`<div class="mrow text-row${i===s.i?' cur':''}" data-tid="${i}">
        <span class="mleft"><span class="maddr">0x${a.addr}</span> <span class="mname">${a.bytes}</span></span>
        <span class="mval" style="font-size:10px;color:var(--dim)">${a.fn} · ${op.split(/\s+/)[0]}</span></div>`;
    });
    return `<div class="mcol" id="txt-col">${rows}</div>`;
  }
  return `<div style="font-size:10.5px;color:var(--dim);font-family:var(--mono);line-height:1.5">${seg.note||''}</div>`;
}
// 三列分组:栈(高地址) | mmap+堆(动态区) | 静态区(.bss/.data/.rodata/.text)
const MEM_COLS=[
  {title:'栈区 · 高地址',  ids:['stack']},
  {title:'动态区',         ids:['mmap','heap']},
  {title:'静态区 · 低地址', ids:['bss','data','rodata','text']},
];
function bandHTML(seg,s){
  const active=(s.activeSegs||['stack','text']).includes(seg.id);
  const open=active && openSegs.has(seg.id);
  return `<div class="seg2 ${seg.cls}${open?' open':''}${active?' active':' dark'}" data-seg="${seg.id}">
    <div class="seghd"><span class="caret">▶</span><span class="sn">${seg.name}</span>
      <span class="srange">${seg.range}</span></div>
    <div class="segbody">${segBodyHTML(seg,s)}</div></div>`;
}
function memHTML(s){
  const cols=MEM_COLS.map(col=>{
    const bands=col.ids.map(id=>bandHTML(SEGMENTS.find(x=>x.id===id),s)).join('');
    return `<div class="mem-col"><div class="mem-col-hd">${col.title}</div>${bands}</div>`;
  }).join('');
  return `<div class="device mem"><div class="dh"><span>▦</span>内存 · 进程地址空间<span style="margin-left:auto;font-size:9px;color:var(--faint);font-weight:400">点击段展开</span></div>
    <div class="db"><div class="addr-space cols3">${cols}</div></div></div>`;
}

function busHTML(flow){
  return `<div class="bus"><svg viewBox="0 0 74 120" preserveAspectRatio="none">
    <path class="rail${flow?' lit':''}" d="M0 60 H74"/>
    <circle class="trail" r="4" fill="var(--hot)" opacity="0" cx="37" cy="60"/>
    </svg><div class="blabel${flow?' show':''}">${flow?flow.label:''}</div></div>`;
}

// 把指针标签挂到内存格子上:按目标槽分组,同指一格的竖排成摞
function placePtrGroup(col,sel,key,ptrs){
  // ptrs: [{name,target}] —— target 与 data 属性 key 匹配
  const byTarget={};
  ptrs.forEach(p=>{if(p.target==null)return;(byTarget[p.target]=byTarget[p.target]||[]).push(p.name);});
  Object.entries(byTarget).forEach(([target,names])=>{
    const row=col.querySelector(`.mrow[${key}="${target}"]`);if(!row)return;
    const g=document.createElement('div');g.className='mptr-group';
    g.innerHTML=`<span class="garw">◀</span><div class="mptr-stack">`+
      names.map(n=>`<span class="mptr ${n}">%${n}</span>`).join('')+`</div>`;
    col.appendChild(g);
    g.style.top=(row.offsetTop+row.offsetHeight/2)+'px';
  });
}
function placePointers(s){
  const col=$('stk-col'),txt=$('txt-col');
  if(col) placePtrGroup(col,'.mrow','data-sid',[{name:'rsp',target:s.rspAt},{name:'rbp',target:s.rbpAt}]);
  if(txt) placePtrGroup(txt,'.mrow','data-tid',[{name:'rip',target:s.i}]);
}

const stage=$('stage');
function render(){
  const s=STEPS[cur];
  renderCode(s.i);
  const hasMem=s.devices.includes('mem');
  let html=cpuHTML(s);
  if(hasMem) html+=busHTML(s.flow)+memHTML(s);
  stage.innerHTML=html;
  if(hasMem){ requestAnimationFrame(()=>placePointers(s)); if(s.flow) animateTrail(s.flow.dir); }
  const b=$('badge');
  b.textContent=s.done?'完成':('步骤 '+(cur+1));
  b.className='badge'+(s.done?' done':'');
  $('narr-text').innerHTML=s.narr;
  $('counter').textContent=(cur+1)+' / '+STEPS.length;
  $('prev').disabled=cur===0;$('next').disabled=cur===STEPS.length-1;
}

// 点击段头展开/折叠(置黑的段不可展开)
stage.addEventListener('click',e=>{
  const hd=e.target.closest('.seghd');if(!hd)return;
  const seg=hd.closest('.seg2');if(seg.classList.contains('dark'))return;
  const id=seg.dataset.seg;
  if(openSegs.has(id))openSegs.delete(id);else openSegs.add(id);
  render();
});

function animateTrail(dir){
  const svg=stage.querySelector('.bus svg');if(!svg)return;
  const base=svg.querySelector('.trail'),N=5,t0=performance.now(),dur=750,trail=[];
  for(let i=0;i<N;i++){const c=base.cloneNode();c.setAttribute('opacity','0');svg.appendChild(c);trail.push(c);}
  (function frame(now){
    const t=Math.min(1,(now-t0)/dur);
    trail.forEach((c,i)=>{
      const lag=t-i*0.07;if(lag<0){c.setAttribute('opacity','0');return;}
      const x=dir==='w'?lag*74:74-lag*74;
      c.setAttribute('cx',Math.max(0,Math.min(74,x)));
      c.setAttribute('opacity',(1-i/N)*0.85*(1-Math.max(0,t-0.85)/0.15));
      c.setAttribute('r',4-i*0.5);
    });
    if(t<1)requestAnimationFrame(frame);else trail.forEach(c=>c.remove());
  })(performance.now());
}

function go(n){cur=Math.max(0,Math.min(STEPS.length-1,n));render();}
$('next').onclick=()=>go(cur+1);
$('prev').onclick=()=>go(cur-1);
$('reset').onclick=()=>{stopAuto();go(0);};
function stopAuto(){autoOn=false;clearTimeout(timer);$('auto').textContent='▶ 自动';$('auto').classList.remove('primary');}
$('auto').onclick=()=>{
  if(autoOn){stopAuto();return;}
  autoOn=true;$('auto').textContent='⏸ 暂停';$('auto').classList.add('primary');
  (function loop(){if(!autoOn)return;if(cur>=STEPS.length-1){stopAuto();return;}go(cur+1);timer=setTimeout(loop,+$('speed').value);})();
};
document.querySelectorAll('.tab').forEach(t=>t.onclick=()=>{
  document.querySelectorAll('.tab').forEach(x=>x.classList.toggle('on',x===t));
  track=t.dataset.track;renderCode(STEPS[cur].i);
});
document.addEventListener('keydown',e=>{
  if(e.key==='ArrowRight'){go(cur+1);e.preventDefault();}
  if(e.key==='ArrowLeft'){go(cur-1);e.preventDefault();}
  if(e.key===' '){$('auto').click();e.preventDefault();}
});
render();
</script>
</body>
</html>
